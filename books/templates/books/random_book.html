{% extends "books/base.html" %}
{% block title %}Featured Book{% endblock %}
{% block content %}
  <div class="card">
    <img src="{{ book.image_url }}" alt="{{ book.title }}" style="max-width:180px; float:left; margin-right:1.5rem;">
    <h1>{{ book.title }}</h1>
    <p>{{ book.category }} · {{ stars }} · {{ book.price }}</p>
    <p>{{ book.description|truncatewords:60 }}</p>
    <a class="btn" href="{{ book.book_url }}" target="_blank">View on source site</a>
    <a class="btn" href="/" style="background:#eef2f7;color:#4a6fa5;">Show another</a>
  </div>
{% endblock %}
