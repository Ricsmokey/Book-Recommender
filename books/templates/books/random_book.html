<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover a Book</title>
  <style>
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #f4f1ea; margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .page { width: 100%; max-width: 720px; }
    .header { text-align: center; margin-bottom: 1.5rem; }
    .header h1 { font-size: 2rem; color: #2c3e50; margin: 0 0 0.3rem; }
    .header p { color: #8a8276; font-size: 0.95rem; margin: 0; }
    .card {
      background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.12);
      overflow: hidden; display: flex; flex-wrap: wrap;
    }
    .cover {
      flex: 0 0 220px; background: #2c3e50;
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .cover img { max-width: 100%; border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    .details { flex: 1; min-width: 280px; padding: 2rem; }
    .category {
      display: inline-block; background: #eef2f7; color: #4a6fa5;
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; padding: 0.3rem 0.7rem; border-radius: 20px; margin-bottom: 0.8rem;
    }
    .details h1 { font-size: 1.5rem; margin: 0 0 0.5rem; color: #1a1a1a; }
    .stars { color: #f5a623; font-size: 1.3rem; letter-spacing: 3px; }
    .price { font-size: 1.3rem; font-weight: 700; color: #2c7a4b; margin: 0.6rem 0 1rem; }
    .description { color: #555; line-height: 1.6; font-size: 0.95rem; margin-bottom: 1.5rem; }
    .actions { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .btn { text-decoration: none; padding: 0.7rem 1.3rem; border-radius: 8px; font-weight: 600; font-size: 0.9rem; }
    .btn-primary { background: #4a6fa5; color: #fff; }
    .btn-secondary { background: #eef2f7; color: #4a6fa5; }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>Discover a Book</h1>
      <p>A random pick from 1,000 titles scraped from Books to Scrape</p>
    </header>
    <div class="card">
      <div class="cover">
        <img src="{{ book.image_url }}" alt="{{ book.title }} cover">
      </div>
      <div class="details">
        <span class="category">{{ book.category }}</span>
        <h1>{{ book.title }}</h1>
        <div class="stars">{{ stars }}</div>
        <div class="price">{{ book.price }}</div>
        <p class="description">{{ book.description|truncatewords:60 }}</p>
        <div class="actions">
          <a class="btn btn-primary" href="{{ book.book_url }}" target="_blank">View on Books to Scrape</a>
          <a class="btn btn-secondary" href="/">Show me another</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
