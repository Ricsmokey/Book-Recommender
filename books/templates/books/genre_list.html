{% extends "books/base.html" %}
{% block title %}Genres — Discover a Book{% endblock %}

{% block extra_css %}
<style>
  h1 { font-size: 2rem; margin-bottom: 1.5rem; }
  .genre-grid { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
  .genre-tile {
    flex: 0 0 calc(25% - 0.75rem);
    text-align: center; padding: 1.1rem;
    border: 2px solid #a23b2d; border-radius: 10px;
    color: #a23b2d; background: transparent; font-weight: 700;
    transition: background 0.18s ease, color 0.18s ease;
  }
  .genre-tile:hover { background: #a23b2d; color: #fff; }
</style>
{% endblock %}

{% block content %}
  <h1>All genres</h1>
  <div class="genre-grid">
    {% for category in genres %}
      <a class="genre-tile" href="/genre/{{ category }}/">{{ category }}</a>
    {% endfor %}
  </div>
{% endblock %}
